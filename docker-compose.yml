services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://myapp:myapp@db:5432/myapp_development
      RACK_ENV: development
      JWT_SECRET: dev-secret-change-in-production
    volumes:
      - .:/app
    command: bundle exec rerun --background 'puma -b tcp://0.0.0.0:3000'

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: myapp
      POSTGRES_PASSWORD: myapp
      POSTGRES_DB: myapp_development
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myapp"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
